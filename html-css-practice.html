<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML & CSS Practice Arena</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Clash+Display:wght@600;700&family=Satoshi:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0e14;
  --surface: #16161f;
  --card: #1d1d2a;
  --border: #2c2c3e;
  --border2: #3a3a50;
  --accent: #e8fb61;
  --accent-dim: rgba(232,251,97,0.12);
  --blue: #61c3fb;
  --blue-dim: rgba(97,195,251,0.1);
  --green: #61fbaa;
  --green-dim: rgba(97,251,170,0.1);
  --red: #fb6161;
  --red-dim: rgba(251,97,97,0.1);
  --text: #ddddf0;
  --muted: #6b6b88;
  --muted2: #9898b0;
  --editor-bg: #0a0a10;
}

body {
  font-family: 'Satoshi', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── TOP BAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 16px;
}

.brand {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 15px;
  color: var(--accent);
  white-space: nowrap;
}

.challenge-tabs {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
  flex: 1;
  justify-content: center;
}
.challenge-tabs::-webkit-scrollbar { display: none; }

.ctab {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted2);
  font-family: 'Satoshi', sans-serif;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.18s;
}
.ctab:hover { background: var(--card); color: var(--text); border-color: var(--border); }
.ctab.active {
  background: var(--accent-dim);
  color: var(--accent);
  border-color: rgba(232,251,97,0.35);
}
.ctab .diff {
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 20px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.diff.easy { background: rgba(97,251,170,0.15); color: var(--green); }
.diff.medium { background: rgba(97,195,251,0.15); color: var(--blue); }
.diff.hard { background: rgba(251,97,97,0.15); color: var(--red); }

.topbar-actions { display: flex; gap: 8px; align-items: center; }

.btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  padding: 7px 16px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
  letter-spacing: 0.3px;
}
.btn-ghost { background: transparent; color: var(--muted2); }
.btn-ghost:hover { background: var(--card); color: var(--text); }
.btn-accent { background: var(--accent); color: #0e0e14; border-color: var(--accent); }
.btn-accent:hover { background: #f5ff80; }
.btn-blue { background: var(--blue-dim); color: var(--blue); border-color: rgba(97,195,251,0.3); }
.btn-blue:hover { background: rgba(97,195,251,0.2); }

/* ── MAIN LAYOUT ── */
.workspace {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  flex: 1;
  overflow: hidden;
  gap: 0;
}

.panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--border);
}
.panel:last-child { border-right: none; }

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: 42px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.panel-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.label-target { color: var(--blue); }
.label-code { color: var(--accent); }
.label-output { color: var(--green); }

.panel-body { flex: 1; overflow: hidden; position: relative; }

/* ── TARGET PANEL ── */
.target-body {
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
}
.target-body iframe {
  width: 100%;
  height: 100%;
  border: none;
  background: white;
  display: block;
}

/* ── EDITOR PANEL ── */
.editor-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.etab {
  padding: 8px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}
.etab:hover { color: var(--text); }
.etab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--accent-dim); }

.editor-wrap { flex: 1; position: relative; overflow: hidden; }
.code-editor {
  width: 100%;
  height: 100%;
  background: var(--editor-bg);
  color: #c8d3e8;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
  padding: 16px;
  border: none;
  resize: none;
  outline: none;
  tab-size: 2;
  overflow: auto;
}
.code-editor::placeholder { color: #3a3a52; }

/* syntax-like coloring via textarea — we'll use a custom highlight overlay */
.editor-container {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── OUTPUT PANEL ── */
#outputFrame {
  width: 100%;
  height: 100%;
  border: none;
  background: white;
}

/* ── BOTTOM BAR ── */
.bottombar {
  height: 48px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  flex-shrink: 0;
  gap: 12px;
}

.hint-text {
  font-size: 12px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.hint-text strong { color: var(--blue); }

.score-display {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted2);
}
.score-val {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
}

/* ── RESULT TOAST ── */
.toast {
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  padding: 12px 28px;
  border-radius: 50px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--green); color: #0a1f14; }
.toast.error { background: var(--red); color: #1f0a0a; }
.toast.info { background: var(--blue); color: #0a141f; }

/* ── HINT PANEL ── */
.hint-overlay {
  position: absolute;
  inset: 0;
  background: rgba(10,10,16,0.96);
  display: none;
  flex-direction: column;
  padding: 20px;
  z-index: 10;
  overflow-y: auto;
}
.hint-overlay.show { display: flex; }
.hint-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 14px;
  letter-spacing: 0.5px;
}
.hint-item {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--muted2);
}
.hint-item::before {
  content: '→';
  color: var(--accent);
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
}
code {
  background: var(--card);
  padding: 1px 6px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--blue);
}

/* ── COMPARE overlay ── */
.compare-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--border);
  z-index: 5;
}
.compare-bar .bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">&lt;/practice&gt;</div>
  <div class="challenge-tabs" id="challengeTabs"></div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="toggleHint()">💡 Hint</button>
    <button class="btn btn-blue" onclick="resetCode()">↺ Reset</button>
    <button class="btn btn-accent" onclick="checkAnswer()">▶ Run & Check</button>
  </div>
</div>

<!-- WORKSPACE -->
<div class="workspace">

  <!-- TARGET -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-label label-target">🎯 Target Design</span>
      <span style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace">match this</span>
    </div>
    <div class="panel-body">
      <iframe id="targetFrame" sandbox="allow-same-origin"></iframe>
    </div>
  </div>

  <!-- EDITOR -->
  <div class="panel" style="flex-direction:column;display:flex;position:relative">
    <div class="panel-header">
      <span class="panel-label label-code">✏️ Your Code</span>
    </div>
    <div class="editor-tabs" id="editorTabs">
      <div class="etab active" onclick="switchTab('html')">HTML</div>
      <div class="etab" onclick="switchTab('css')">CSS</div>
    </div>
    <div class="editor-container">
      <textarea class="code-editor" id="htmlEditor" placeholder="<!-- write your HTML here -->&#10;&#10;"></textarea>
      <textarea class="code-editor" id="cssEditor" placeholder="/* write your CSS here */" style="display:none"></textarea>
    </div>
    <!-- Hint overlay -->
    <div class="hint-overlay" id="hintOverlay">
      <div class="hint-title">💡 HINTS FOR THIS CHALLENGE</div>
      <div id="hintList"></div>
      <button class="btn btn-ghost" style="margin-top:auto;align-self:flex-start" onclick="toggleHint()">✕ Close</button>
    </div>
  </div>

  <!-- OUTPUT -->
  <div class="panel" style="position:relative">
    <div class="panel-header">
      <span class="panel-label label-output">⚡ Your Output</span>
      <span style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace" id="matchPct">—</span>
    </div>
    <div class="compare-bar"><div class="bar-fill" id="matchBar" style="width:0%"></div></div>
    <div class="panel-body">
      <iframe id="outputFrame" sandbox="allow-same-origin"></iframe>
    </div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div class="bottombar">
  <div class="hint-text" id="hintBar">Select a challenge above and start coding. Press <strong>Run & Check</strong> to see how close you are!</div>
  <div class="score-display">
    Score: <span class="score-val" id="scoreVal">0</span>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

let currentChallenge = null;
let activeTab = 'html';
let score = 0;
let hintVisible = false;

function buildTabs() {
  const container = document.getElementById('challengeTabs');
  container.innerHTML = '';
  challenges.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'ctab';
    btn.innerHTML = `${c.name} <span class="diff ${c.difficulty}">${c.difficulty.toUpperCase()}</span>`;
    btn.onclick = () => loadChallenge(i);
    container.appendChild(btn);
  });
}

function loadChallenge(idx) {
  currentChallenge = challenges[idx];
  document.querySelectorAll('.ctab').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.getElementById('htmlEditor').value = currentChallenge.starterHTML;
  document.getElementById('cssEditor').value = currentChallenge.starterCSS;
  document.getElementById('hintBar').innerHTML = `<strong>${currentChallenge.name}:</strong> ${currentChallenge.bottomHint}`;
  document.getElementById('matchPct').textContent = '—';
  document.getElementById('matchBar').style.width = '0%';
  hintVisible = false;
  document.getElementById('hintOverlay').classList.remove('show');

  // Build hint list
  const hintList = document.getElementById('hintList');
  hintList.innerHTML = '';
  currentChallenge.hint.forEach(h => {
    const div = document.createElement('div');
    div.className = 'hint-item';
    div.innerHTML = h;
    hintList.appendChild(div);
  });

  // Render target
  const tf = document.getElementById('targetFrame');
  tf.srcdoc = currentChallenge.target;

  // Clear output
  document.getElementById('outputFrame').srcdoc = `<html><body style="background:#0e0e14;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;color:#3a3a52;font-size:13px">Click ▶ Run &amp; Check to see your output</body></html>`;

  showToast(`Challenge loaded: ${currentChallenge.name}`, 'info');
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.etab').forEach((t, i) => t.classList.toggle('active', (i === 0 && tab === 'html') || (i === 1 && tab === 'css')));
  document.getElementById('htmlEditor').style.display = tab === 'html' ? 'block' : 'none';
  document.getElementById('cssEditor').style.display = tab === 'css' ? 'block' : 'none';
}

function buildOutput() {
  const html = document.getElementById('htmlEditor').value;
  const css = document.getElementById('cssEditor').value;
  return `<!DOCTYPE html><html><head><style>*{margin:0;padding:0;box-sizing:border-box;}${css}</style></head><body>${html}</body></html>`;
}

function checkAnswer() {
  if (!currentChallenge) { showToast('Pick a challenge first!', 'error'); return; }
  const output = buildOutput();
  document.getElementById('outputFrame').srcdoc = output;

  // Rough scoring: check how many CSS properties user has written
  const css = document.getElementById('cssEditor').value;
  const html = document.getElementById('htmlEditor').value;
  const props = (css.match(/[a-z-]+\s*:/g) || []).length;
  const hasStructure = html.length > 50;
  const targetProps = (currentChallenge.target.match(/[a-z-]+\s*:/g) || []).length;
  const pct = Math.min(100, Math.round((props / Math.max(targetProps * 0.7, 1)) * 100));

  document.getElementById('matchBar').style.width = pct + '%';
  document.getElementById('matchPct').textContent = pct + '% match';

  if (pct >= 80) {
    showToast('🎉 Excellent! Great match!', 'success');
    score += 10;
  } else if (pct >= 50) {
    showToast('👍 Good progress! Keep styling', 'info');
    score += 5;
  } else if (pct >= 20) {
    showToast('💪 Keep going! Add more CSS', 'info');
    score += 2;
  } else {
    showToast('🚀 Start adding CSS properties!', 'error');
  }
  document.getElementById('scoreVal').textContent = score;
}

function resetCode() {
  if (!currentChallenge) return;
  document.getElementById('htmlEditor').value = currentChallenge.starterHTML;
  document.getElementById('cssEditor').value = currentChallenge.starterCSS;
  document.getElementById('matchBar').style.width = '0%';
  document.getElementById('matchPct').textContent = '—';
  showToast('Code reset!', 'info');
}

function toggleHint() {
  hintVisible = !hintVisible;
  document.getElementById('hintOverlay').classList.toggle('show', hintVisible);
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Tab key support in editors
['htmlEditor','cssEditor'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = this.selectionStart, end = this.selectionEnd;
      this.value = this.value.substring(0,s) + '  ' + this.value.substring(end);
      this.selectionStart = this.selectionEnd = s + 2;
    }
    if (e.ctrlKey && e.key === 'Enter') checkAnswer();
  });
});

buildTabs();
loadChallenge(0);
